# SonarQube Project Configuration for Rails 8 Demo

# Project identification
sonar.projectKey=demo-project
sonar.projectName=SonarQube Demo
sonar.projectVersion=1.0


# Source code location
sonar.sources=app,lib
sonar.tests=test
sonar.sourceEncoding=UTF-8

# Language
sonar.language=ruby

# Exclusions (don't scan these)
sonar.exclusions=**/node_modules/**,**/vendor/**,**/tmp/**,**/log/**,**/public/**,db/schema.rb

# Ruby specific settings
sonar.ruby.coverage.reportPaths=coverage/.resultset.json

# Additional settings
sonar.scm.disabled=false

# External issues report (generated by custom Rails security scanner)

sonar.token=squ_04e896170b631f123151da6e708e91bc19e23aee

sonar.ruby.rubocop.reportPaths=rubocop.json


sonar.externalIssuesReportPaths=brakeman-sonar.json
