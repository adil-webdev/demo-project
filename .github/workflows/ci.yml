  sonarqube:
      needs: [ test ]
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v6.0.2

        - name: Set up Ruby
          uses: ruby/setup-ruby@v1.302.0
          with:
            bundler-cache: true

        - name: Download coverage report
          uses: actions/download-artifact@v8.0.1
          with:
            name: coverage-report
            path: coverage/
          continue-on-error: true

        - name: Generate Brakeman report
          run: bin/brakeman --format sonar --output brakeman-sonar.json || true
        
        - name: Generate RuboCop report
          run: bundle exec rubocop --format json --out rubocop.json || true

        - name: SonarQube Scan
          uses: SonarSource/sonarqube-scan-action@v7.1.0
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

        - name: SonarQube Quality Gate Check
          uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          