name: CI

on:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1.302.0
        with:
          bundler-cache: true

      # - name: Scan for common Rails security vulnerabilities using static analysis
      #   run: bin/brakeman --no-pager
      
      # - name: Scan for known security vulnerabilities in gems used
      #   run: bin/bundler-audit
      
  # scan_js:
  #   runs-on: ubuntu-latest

  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v6.0.2

  #     - name: Set up Ruby
  #       uses: ruby/setup-ruby@v1.302.0
  #       with:
  #         bundler-cache: true

  #     - name: Scan for security vulnerabilities in JavaScript dependencies
  #       run: bin/importmap audit

  test:
    runs-on: ubuntu-latest
    needs: [ scan_ruby ]

    services:
      mysql:
        image: mysql
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_USER: railsdev
          MYSQL_PASSWORD: black
          MYSQL_DATABASE: sqe_test
        ports:
          - 3307:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      # redis:
      #   image: valkey/valkey:8
      #   ports:
      #     - 6379:6379
      #   options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y default-libmysqlclient-dev

      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1.302.0
        with:
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: mysql2://127.0.0.1:3307
          # RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          # REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare test

      - name: rename coverage file for SonarQube
        run: |
          cp coverage/.resultset.json coverage/coverage.json
          echo "Renamed coverage/.resultset.json to coverage/coverage.json for SonarQube compatibility"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

